<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>💰 Expense Tracker</h1>

    <!-- Summary Cards -->
    <div class="summary">
      <div class="card income">
        <span class="label">Total Income</span>
        <span class="amount" id="total-income">$0.00</span>
      </div>
      <div class="card expense">
        <span class="label">Total Expenses</span>
        <span class="amount" id="total-expense">$0.00</span>
      </div>
      <div class="card balance">
        <span class="label">Balance</span>
        <span class="amount" id="balance">$0.00</span>
      </div>
    </div>

    <!-- Add Transaction Form -->
    <div class="form-section">
      <h2>Add Transaction</h2>
      <form id="transaction-form">
        <div class="form-row">
          <div class="form-group">
            <label for="description">Description</label>
            <input type="text" id="description" placeholder="e.g. Groceries" required />
          </div>
          <div class="form-group">
            <label for="amount">Amount ($)</label>
            <input type="number" id="amount" placeholder="0.00" step="0.01" min="0.01" required />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="type">Type</label>
            <select id="type" required>
              <option value="expense">Expense</option>
              <option value="income">Income</option>
            </select>
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" required>
              <option value="food">🍔 Food</option>
              <option value="transport">🚗 Transport</option>
              <option value="housing">🏠 Housing</option>
              <option value="entertainment">🎮 Entertainment</option>
              <option value="health">🏥 Health</option>
              <option value="shopping">🛍️ Shopping</option>
              <option value="salary">💼 Salary</option>
              <option value="other">📦 Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" required />
          </div>
        </div>
        <button type="submit" class="btn-add">+ Add Transaction</button>
      </form>
    </div>

    <!-- Filter & Search -->
    <div class="filter-section">
      <h2>Transactions</h2>
      <div class="filters">
        <input type="text" id="search" placeholder="🔍 Search transactions..." />
        <select id="filter-type">
          <option value="all">All Types</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
        </select>
        <select id="filter-category">
          <option value="all">All Categories</option>
          <option value="food">Food</option>
          <option value="transport">Transport</option>
          <option value="housing">Housing</option>
          <option value="entertainment">Entertainment</option>
          <option value="health">Health</option>
          <option value="shopping">Shopping</option>
          <option value="salary">Salary</option>
          <option value="other">Other</option>
        </select>
        <button id="btn-clear-all" class="btn-clear">🗑️ Clear All</button>
      </div>
    </div>

    <!-- Transaction List -->
    <ul id="transaction-list" class="transaction-list">
      <li class="empty-state" id="empty-state">No transactions yet. Add one above!</li>
    </ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
