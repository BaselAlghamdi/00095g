<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>💰 Expense Tracker</h1>

    <section class="summary-section">
      <div class="summary-card total">
        <span class="label">Total Expenses</span>
        <span class="amount" id="total-amount">$0.00</span>
      </div>
    </section>

    <section class="category-summary" id="category-summary"></section>

    <section class="form-section">
      <h2>Add Expense</h2>
      <form id="expense-form">
        <div class="form-group">
          <label for="description">Description</label>
          <input type="text" id="description" placeholder="e.g. Grocery shopping" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="amount">Amount ($)</label>
            <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01" required />
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" required>
              <option value="">Select category</option>
              <option value="Food">🍔 Food</option>
              <option value="Transport">🚗 Transport</option>
              <option value="Housing">🏠 Housing</option>
              <option value="Entertainment">🎬 Entertainment</option>
              <option value="Health">💊 Health</option>
              <option value="Shopping">🛍️ Shopping</option>
              <option value="Utilities">💡 Utilities</option>
              <option value="Other">📦 Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" required />
          </div>
        </div>
        <button type="submit" class="btn-add">Add Expense</button>
      </form>
    </section>

    <section class="expenses-section">
      <div class="expenses-header">
        <h2>Expenses</h2>
        <div class="filters">
          <select id="filter-category">
            <option value="all">All Categories</option>
            <option value="Food">🍔 Food</option>
            <option value="Transport">🚗 Transport</option>
            <option value="Housing">🏠 Housing</option>
            <option value="Entertainment">🎬 Entertainment</option>
            <option value="Health">💊 Health</option>
            <option value="Shopping">🛍️ Shopping</option>
            <option value="Utilities">💡 Utilities</option>
            <option value="Other">📦 Other</option>
          </select>
          <select id="sort-by">
            <option value="date-desc">Newest First</option>
            <option value="date-asc">Oldest First</option>
            <option value="amount-desc">Highest Amount</option>
            <option value="amount-asc">Lowest Amount</option>
          </select>
        </div>
      </div>
      <ul id="expense-list" class="expense-list">
        <li class="empty-state" id="empty-state">No expenses yet. Add one above!</li>
      </ul>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
